<!DOCTYPE html>
<html>
<head>
    <title>Portal Access</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
            font-size: 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 50px;
            gap: 40px;
        }

        .circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: white;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
            cursor: pointer;
        }

        .circle:hover {
            transform: scale(1.1);
            background: #ffdd57;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Portal Access</h1>

    <div class="container">

        <a href="{{ url_for('student_login') }}">
            <div class="circle">Student Login</div>
        </a>

        <a href="{{ url_for('student_register') }}">
            <div class="circle">Student Register</div>
        </a>

        <a href="{{ url_for('company_login') }}">
            <div class="circle">Company Login</div>
        </a>

        <a href="{{ url_for('company_register') }}">
            <div class="circle">Company Register</div>
        </a>

        <a href="{{ url_for('admin_login') }}">
            <div class="circle">Admin Login</div>
        </a>

    </div>

</body>
</html>
