<!DOCTYPE html>
<html>
<head>
<title>Student Applications</title>
</head>

<body>

<h2>Student Applications</h2>

<table border="1">

<tr>
<th>Application ID</th>
<th>Student ID</th>
<th>Status</th>
</tr>

{% for app in applications %}

<tr>
<td>{{ app.id }}</td>
<td>{{ app.student_id }}</td>
<td>{{ app.status }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
