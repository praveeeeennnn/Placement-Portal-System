<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;
            color: white;

            background: linear-gradient(135deg, #667eea, #764ba2);
            overflow: hidden;
        }

        body::before {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
        }

        body::after {
            width: 200px;
            height: 200px;
            bottom: 10%;
            right: 10%;
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 60px;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            max-width: 600px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        button {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 30px;

            background: linear-gradient(135deg, #64c459, #7bfe9c);
            color: white;

            cursor: pointer;
            transition: 0.3s;
        }

        a {
            text-decoration: none;
        }

    </style>
</head>

<body>

<h1>Placement Portal</h1>

<p>
Start your journey towards your dream job.  
Connect with top companies and explore opportunities in one place.
</p>

<a href="/home">
    <button>Enter Portal </button>
</a>

</body>
</html>
